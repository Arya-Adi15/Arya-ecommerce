<!DOCTYPE html>
<html>

<head>
    <title>Beauty Sale</title>
    <link rel="stylesheet" href="beauty.css">
</head>

<body>

    <!-- HERO BANNER -->
    <div class="beauty-hero">
        <h1>💄 Beauty Mega Sale</h1>
        <p>Glow More – Pay Less</p>
    </div>

    <!-- TIMER -->
    <div class="timer-box">
        Sale Ends In <span id="timer"></span>
    </div>

    <!-- CATEGORIES -->
    <div class="cats">
        <button onclick="filter('beauty')" class="active">All</button>
        <button onclick="filter('perfume')">Perfumes</button>
        <button onclick="filter('hair')">Hair</button>
        <button onclick="filter('eye')">Eye</button>
        <button onclick="filter('face')">Face</button>
        <button onclick="filter('lip')">Lip</button>
    </div>

    <h3 class="hot">🔥 Hot Beauty Deals</h3>

    <!-- PRODUCTS -->
    <div id="products"></div>

    <!-- PROMO BANNERS -->
    <div class="beauty-banners">
        <img src="https://rukminim1.flixcart.com/fk-p-flap/3140/700/image/663de47e47cf1d9b.jpg?q=60">
        <img src="https://rukminim1.flixcart.com/fk-p-flap/3140/1220/image/d6532e9504a30e16.png?q=60">
        <img src="https://rukminim1.flixcart.com/fk-p-flap/1418/1276/image/62e07cbaae59fcc7.png?q=60" alt="">
    </div>
    <h2 class="budget-title">Glam on a budget</h2>

    <div class="budget-grid">

        <div class="budget-card">Under<br><span>₹199</span></div>
        <div class="budget-card">Under<br><span>₹299</span></div>
        <div class="budget-card">Under<br><span>₹399</span></div>

        <div class="budget-card">Min.<br><span>30%</span><small>Off</small></div>
        <div class="budget-card">Min.<br><span>50%</span><small>Off</small></div>
        <div class="budget-card">Min.<br><span>70%</span><small>Off</small></div>

    </div>

    <script src="data.js"></script>
    <script src="main.js"></script>

</body>

</html>
